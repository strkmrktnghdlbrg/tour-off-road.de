name: off-roadtours.de htaccess (manual)

# Manuell ausloesbar. mode=inspect (Standard) sucht nur den Docroot von
# off-roadtours.de im A2-Account und zeigt die aktuelle .htaccess.
# mode=place legt die aktuelle 301-.htaccess (Quelle: Ordner
# "Hotel, Reiseportale/off-roadtours.de-301/", hier base64-embedded) NUR dann
# ab, wenn ein Ordner gefunden wird, dessen Name "off-roadtours" enthaelt
# (und niemals in einem tour-off-road-Pfad).
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "inspect (nur suchen) oder place (htaccess ablegen)"
        required: true
        default: "inspect"
        type: choice
        options: [inspect, place]

jobs:
  offroadtours-htaccess:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: SSH inspect / place
        uses: appleboy/ssh-action@v1.0.3
        env:
          MODE: ${{ inputs.mode }}
          HT_B64: ""
        with:
          host: nl1-ts109.a2hosting.com
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: MODE,HT_B64
          script: |
            set -e
            echo "===== MODE: $MODE ====="
            CAND="$(find "$HOME" -maxdepth 3 -type d -iname '*off-roadtours*' 2>/dev/null | grep -vi 'tour-off-road' | head -1 || true)"
            echo "===== Kandidat-Docroot: '${CAND:-<keiner>}' ====="

            if [ "$MODE" = "place" ]; then
              if [ -z "$CAND" ]; then
                echo "ABBRUCH: Kein off-roadtours-Docroot gefunden. Es wurde NICHTS geschrieben."
                exit 1
              fi
              case "$CAND" in
                *tour-off-road*) echo "SICHERHEITS-ABBRUCH: Pfad enthaelt tour-off-road. Kein Schreiben."; exit 1 ;;
              esac
              echo "===== Inhalt Ziel-Docroot VOR dem Schreiben ====="
              ls -la "$CAND" | head -20
              if [ -f "$CAND/.htaccess" ]; then
                echo "===== Vorhandene .htaccess -> Backup .htaccess.bak-malta ====="
                cp -p "$CAND/.htaccess" "$CAND/.htaccess.bak-malta"
              fi
              echo "$HT_B64" | base64 -d > "$CAND/.htaccess"
              chmod 644 "$CAND/.htaccess"
              echo "===== GESCHRIEBEN nach $CAND/.htaccess (Malta-Regel:) ====="
              grep -n "malta" "$CAND/.htaccess" || true
            else
              echo "Inspect-Modus: keine Aenderung vorgenommen."
              if [ -n "$CAND" ]; then
                ls -la "$CAND" | head -20
                if [ -f "$CAND/.htaccess" ]; then
                  echo "===== AKTUELLE $CAND/.htaccess (erste 30 Zeilen) ====="
                  head -30 "$CAND/.htaccess"
                else
                  echo "(noch keine .htaccess im Docroot)"
                fi
              fi
            fi
