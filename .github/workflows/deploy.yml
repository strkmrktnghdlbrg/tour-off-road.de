name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build report
        run: |
          echo "Built files: $(find dist -type f | wc -l)"
          echo "Total size: $(du -sh dist | cut -f1)"

      - name: Commit dist/ to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          git diff --staged --quiet || git commit -m "build: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git pull origin main --rebase
          git push origin main

      - name: Trigger cPanel pull
        run: |
          CPANEL_HOST=$(echo "${{ secrets.CPANEL_HOST }}" | sed 's|https\?://||')
          curl -sf -o /dev/null -w "%{http_code}\n" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_TOKEN }}" \
            "https://${CPANEL_HOST}/execute/VersionControl/update?repository=/home/kdwwnlqe/tour-off-road.de/astro-site"

      - name: Deploy HEAD commit
        run: |
          CPANEL_HOST=$(echo "${{ secrets.CPANEL_HOST }}" | sed 's|https\?://||')
          curl -sf -o /dev/null -w "%{http_code}\n" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_TOKEN }}" \
            "https://${CPANEL_HOST}/execute/VersionControlDeployment/create?repository=/home/kdwwnlqe/tour-off-road.de/astro-site"
